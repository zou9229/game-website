<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 
    Favicon Template (32x32)
    
    Instructions:
    1. Keep design simple - must be clear at 16x16
    2. Use bold shapes and high contrast
    3. Avoid fine details
    4. Test at actual size
  -->
  
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Main symbol (simplified version of main icon) -->
  <circle cx="16" cy="16" r="8" fill="#3B82F6"/>
  
  <!-- Accent (optional) -->
  <rect x="12" y="22" width="8" height="2" rx="1" fill="#10B981"/>
</svg>
