<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 
    Icon Template for Web Applications
    
    Instructions:
    1. Replace the placeholder shapes with your own design
    2. Use your brand colors in the gradients
    3. Keep the design simple and recognizable
    4. Test at small sizes (16x16, 32x32)
  -->
  
  <!-- Define gradients and styles -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Primary element gradient -->
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="80" fill="url(#bg-gradient)"/>
  
  <!-- Main symbol (replace with your design) -->
  <circle cx="256" cy="256" r="120" fill="url(#primary-gradient)" stroke="#1e40af" stroke-width="4"/>
  
  <!-- Accent element (replace with your design) -->
  <rect x="200" y="350" width="112" height="24" rx="8" fill="url(#accent-gradient)"/>
  
  <!-- Subtle glow effect (optional) -->
  <ellipse cx="256" cy="200" rx="80" ry="100" fill="#3b82f6" opacity="0.15"/>
</svg>
